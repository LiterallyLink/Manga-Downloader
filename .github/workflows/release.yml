name: Release

# Push a tag like v2.0.1 and this builds the Windows artifacts and publishes
# them to a GitHub Release. The installed app reads latest.yml from that
# release to auto-update, so the tag must match "version" in package.json.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Fail if tag and package.json disagree
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG."
            exit 1
          fi

      - run: npm ci

      - name: Build and publish
        # electron-builder uploads the installer, blockmap, and latest.yml.
        # GITHUB_TOKEN is provided by Actions — no personal token needed.
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
