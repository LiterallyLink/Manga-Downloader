<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<!-- Everything the phone loads is same-origin: covers and pages come through
	     /file and /proxy on this server, never straight from a manga CDN. So the
	     policy can stay tight; no inline script or style exists to allow. -->
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<meta name="theme-color" content="#0e1015">
	<link rel="icon" href="data:,">
	<title>MangaShelf</title>
	<link rel="stylesheet" href="mobile.css">
</head>
<body>
	<div id="app">
		<div id="content"></div>
		<nav id="nav">
			<button data-view="home"><span class="nav-ic"></span>Home</button>
			<button data-view="search"><span class="nav-ic"></span>Search</button>
			<button data-view="library"><span class="nav-ic"></span>Library</button>
			<button data-view="downloads"><span class="nav-ic"></span>Downloads<span id="dl-badge" class="badge hidden"></span></button>
		</nav>
	</div>
	<div id="toasts"></div>
	<script type="module" src="js/app.js"></script>
</body>
</html>
