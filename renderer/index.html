<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy"
		content="default-src 'self'; img-src 'self' https: data: mangafile:; style-src 'self' 'unsafe-inline'; script-src 'self'">
	<title>MangaShelf</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div id="app">
		<aside id="sidebar">
			<div class="logo">
				<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M2 4c3-1.5 6-1.5 9 0v16c-3-1.5-6-1.5-9 0z" fill="rgba(255,106,61,.25)"/>
					<path d="M22 4c-3-1.5-6-1.5-9 0v16c3-1.5 6-1.5 9 0z" fill="rgba(255,176,61,.2)"/>
				</svg>
				<span>Manga<b>Shelf</b></span>
			</div>
			<nav id="nav">
				<button data-view="home">Home</button>
				<button data-view="browse">Browse</button>
				<button data-view="library">Library</button>
				<button data-view="updates">Updates<span id="up-badge" class="badge hidden"></span></button>
				<button data-view="downloads">Downloads<span id="dl-badge" class="badge hidden"></span></button>
				<button data-view="settings">Settings</button>
			</nav>
			<div class="sidebar-footer">Content &amp; data from <br>MangaDex.org</div>
		</aside>
		<main id="content"></main>
	</div>
	<div id="reader" class="hidden"></div>
	<div id="toasts"></div>
	<script type="module" src="js/app.js"></script>
</body>
</html>
